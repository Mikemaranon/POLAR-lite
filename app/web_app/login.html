<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLAR lite · Login</title>
    <link rel="stylesheet" href="/static/CSS/login.css">

    <script type="module" src="/static/JS/login.js"></script>
</head>
<body>
    <main class="login-layout">
        <section class="login-hero">
            <p class="login-hero__eyebrow">POLAR lite</p>
            <h1>Tu workspace local para chatear con MLX, Ollama y OpenAI</h1>
            <p class="login-hero__copy">
                Una base ligera, privada y preparada para trabajar con proyectos, perfiles y conversaciones persistentes.
            </p>
            <div class="login-hero__note">
                Usuario inicial de desarrollo: <strong>admin</strong> · contraseña <strong>admin</strong>
            </div>
        </section>

        <section class="login-card">
            <div class="login-card__header">
                <p class="login-card__eyebrow">Acceso</p>
                <h2>Entrar a POLAR lite</h2>
            </div>

            <form id="login-form" class="login-form">
                <label for="username">Usuario</label>
                <input type="text" name="username" id="username" placeholder="admin" required>

                <label for="password">Contraseña</label>
                <input type="password" name="password" id="password" placeholder="admin" required>

                <button type="submit">Continuar</button>
            </form>

            <div class="error-message" id="error-message"></div>
        </section>
    </main>
</body>
</html>
